name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  sqlite-safe-mode-changes:
    name: SQLite Safe Mode Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      sqlite_safe_mode: ${{ steps.changes.outputs.sqlite_safe_mode }}
    steps:
      - id: changes
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "sqlite_safe_mode=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(gh api --paginate "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/ci\.yml|Cargo\.lock|Cargo\.toml|rust-toolchain\.toml|src/(app/(Cargo\.toml|model/connection/error\.rs|ports/outbound/.*)|domain/(Cargo\.toml|connection/.*)|infra/(Cargo\.toml|adapters/(mod\.rs|registry\.rs|sqlite/.*|test_support\.rs))))$'; then
            echo "sqlite_safe_mode=true" >> "$GITHUB_OUTPUT"
          else
            echo "sqlite_safe_mode=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - run: ./scripts/lint_all.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: nextest,cargo-insta
      - id: test_all_features
        continue-on-error: true
        run: cargo nextest run --workspace --profile ci-all --all-features --show-progress=none --status-level=fail --final-status-level=fail
      - id: test_no_default_features
        continue-on-error: true
        run: cargo nextest run -p sabiql --profile ci-no-default --no-default-features --show-progress=none --status-level=fail --final-status-level=fail
      - name: Summarize failed tests
        if: steps.test_all_features.outcome == 'failure' || steps.test_no_default_features.outcome == 'failure'
        run: |
          python3 scripts/ci_test_failure_summary.py \
            target/nextest/ci-all/junit-all-features.xml \
            target/nextest/ci-no-default/junit-no-default-features.xml >> "$GITHUB_STEP_SUMMARY"
      - name: Fail job if tests failed
        if: steps.test_all_features.outcome == 'failure' || steps.test_no_default_features.outcome == 'failure'
        run: exit 1
      - name: Reject unreferenced snapshots
        run: cargo insta test --unreferenced=reject -p sabiql

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: nextest
      - name: Start PostgreSQL
        run: docker compose up -d --wait
      - name: Run psql integration tests (Tier 2)
        run: cargo nextest run -p sabiql --run-ignored ignored-only -E 'test(tests::adapter_postgres)' --show-progress=none

  sqlite-safe-mode:
    name: SQLite Safe Mode (${{ matrix.sqlite }})
    needs: sqlite-safe-mode-changes
    if: needs.sqlite-safe-mode-changes.outputs.sqlite_safe_mode == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - sqlite: minimum
            archive: sqlite-autoconf-3410100.tar.gz
            directory: sqlite-autoconf-3410100
            sha256: 4dadfbeab9f8e16c695d4fbbc51c16b2f77fb97ff4c1c3d139919dfc038c9e33
            below_minimum: false
          - sqlite: below-minimum
            archive: sqlite-autoconf-3410000.tar.gz
            directory: sqlite-autoconf-3410000
            sha256: 49f77ac53fd9aa5d7395f2499cb816410e5621984a121b858ccca05310b05c70
            below_minimum: true
          - sqlite: system
            below_minimum: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: nextest
      - name: Install SQLite
        if: matrix.sqlite != 'system'
        run: |
          curl --fail --location --retry 3 \
            https://www.sqlite.org/2023/${{ matrix.archive }} \
            --output "${{ matrix.archive }}"
          echo "${{ matrix.sha256 }}  ${{ matrix.archive }}" | sha256sum --check --status
          tar -xzf "${{ matrix.archive }}"
          cd "${{ matrix.directory }}"
          ./configure --prefix="$HOME/.local"
          make -j2
          make install
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Show SQLite version
        run: sqlite3 --version
      - name: Run SQLite adapter tests
        if: matrix.below_minimum == false
        run: cargo nextest run -p sabiql-infra
      - name: Reject SQLite below the safe mode minimum
        if: matrix.below_minimum
        run: |
          SABIQL_EXPECT_SQLITE_SAFE_MODE_REJECTION=1 cargo test -p sabiql-infra \
            adapters::sqlite::sqlite3::metadata::tests::metadata::rejects_sqlite_before_safe_mode_minimum_at_connection \
            -- --exact
          cargo test -p sabiql-app \
            model::connection::error::tests::error_info::from_db_operation_error_classifies_sqlite_safe_mode_requirement \
            -- --exact

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace --release
      - run: cargo build --workspace --release --no-default-features

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-audit
      - run: bash ./scripts/assert_self_update_backend.sh
      - run: cargo audit

  machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2
        with:
          tool: cargo-machete
      - run: cargo machete
